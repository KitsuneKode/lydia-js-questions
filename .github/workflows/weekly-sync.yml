name: Weekly Upstream Sync

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Refresh all locale sources and generated data
        run: bun run content:refresh

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(content): weekly sync from upstream javascript-questions'
          title: 'chore(content): weekly upstream sync (all locales)'
          body: |
            Automated weekly refresh from https://github.com/lydiahallie/javascript-questions.

            ## Source files updated

            | Locale | Source Path |
            |--------|------------|
            | en | content/source/locales/en/README.upstream.md |
            | es | content/source/locales/es/README.upstream.md |
            | fr | content/source/locales/fr/README.upstream.md |
            | de | content/source/locales/de/README.upstream.md |
            | ja | content/source/locales/ja/README.upstream.md |
            | pt-BR | content/source/locales/pt-BR/README.upstream.md |

            ## Generated content updated

            - `content/generated/locales/<locale>/questions.v1.json` (all available locales)
            - `content/generated/locales/<locale>/manifest.v1.json` (all available locales)
            - `content/generated/locales/index.json` (locale availability index)
            - `content/generated/questions.v1.json` (English alias for backwards compat)
            - `content/generated/manifest.v1.json` (English alias for backwards compat)

            > **Note:** Translated READMEs may lag behind English. Check the locale index for
            > per-locale question counts and coverage.
          branch: chore/weekly-content-sync
          delete-branch: true
          labels: |
            content
            automation
